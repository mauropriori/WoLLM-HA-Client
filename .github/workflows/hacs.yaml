name: HACS Validation

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate with HACS
        uses: hacs/action@main
        with:
          category: integration
          ignore: brands,description,topics
